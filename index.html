<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mukaddas Narzikulova Portfolio</title>
    <script>
      // Defensive script to handle 'fetch' property error
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { console.warn('Something tried to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch, but continuing...');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
